      // Sound notification generator
      const playNotificationSound = () => {
        try {
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          
          // Sound chime 1
          const osc1 = audioContext.createOscillator();
          const gain1 = audioContext.createGain();
          osc1.connect(gain1);
          gain1.connect(audioContext.destination);
          
          osc1.type = 'sine';
          osc1.frequency.setValueAtTime(587.33, audioContext.currentTime); // D5 note
          gain1.gain.setValueAtTime(0.12, audioContext.currentTime);
          gain1.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.35);
          
          osc1.start();
          osc1.stop(audioContext.currentTime + 0.4);

          // Sound chime 2
          setTimeout(() => {
            const osc2 = audioContext.createOscillator();
            const gain2 = audioContext.createGain();
            osc2.connect(gain2);
            gain2.connect(audioContext.destination);
            
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(880.00, audioContext.currentTime); // A5 note
            gain2.gain.setValueAtTime(0.15, audioContext.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            osc2.start();
            osc2.stop(audioContext.currentTime + 0.55);
          }, 140);

        } catch (e) {
          console.warn('Audio feedback failed or not permitted:', e);
        }
      };

      // Helper function to compress large Base64 pictures efficiently
      function compressBase64Image(base64Str, maxWidth = 480, maxHeight = 480) {
        return new Promise((resolve) => {
          const img = new Image();
          img.src = base64Str;
          img.onload = () => {
            let width = img.width;
            let height = img.height;
            if (width > height) {
              if (width > maxWidth) {
                height = Math.round((height * maxWidth) / width);
                width = maxWidth;
              }
            } else {
              if (height > maxHeight) {
                width = Math.round((width * maxHeight) / height);
                height = maxHeight;
              }
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.65));
          };
          img.onerror = () => resolve(base64Str);
        });
      }

                        className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-900 focus:bg-white font-mono"
                      />
                    </div>
                    <div className="space-y-1">
                      <label className="block">အမျိုးအစားအုပ်စု (Category)</label>
                      <input 
                        type="text"
                        required
                        value={editingProduct.category || ''}
                        onChange={e => setEditingProduct({ ...editingProduct, category: e.target.value })}
                        className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-900 focus:bg-white"
                      />
                    </div>

                    {/* Image modification downcompressed uploads options */}
                    <div className="sm:col-span-2 space-y-2 border-t border-slate-100 pt-3">
                      <label className="block text-slate-700 text-[11px] font-black">📸 ကုန်စည်ပုံစံ (ဓါတ်ပုံ တင်ရန် သို့မဟုတ် အီမိုဂျီ သုံးရန်)</label>
                      <div className="flex items-center gap-3">
                        <div className="w-14 h-14 bg-orange-100/40 border border-orange-200 rounded-xl flex items-center justify-center text-xl flex-shrink-0 select-none overflow-hidden">
                          {editingProduct.image && (editingProduct.image.startsWith('http') || editingProduct.image.startsWith('data:image/')) ? (
                            <img src={editingProduct.image} alt="prev" className="w-full h-full object-cover" />
                          ) : (
                            editingProduct.image || '📦'
                          )}
                        </div>

                        <div className="flex-1">
                          <label className="block bg-[#FFFDF9] hover:bg-orange-50 border border-slate-300 text-slate-650 cursor-pointer text-center text-[10.5px] rounded-xl px-4 py-2 font-bold shadow-3xs hover:border-orange-300 active:scale-95 transition">
                            📁 ပုံအသစ် ရွေးချယ်ရန်
                            <input 
                              type="file"
                              accept="image/*"
                              onChange={(e) => {
                                const file = e.target.files?.[0];
                                if (file) {
                                  if (file.size > 8 * 1024 * 1024) {
                                    triggerToast('ပုံအရွယ်အစား 8MB ထက်ငယ်ရပါမည်', 'error');
                                    return;
                                  }
                                  const reader = new FileReader();
                                  reader.onloadend = async () => {
                                    const compressed = await compressBase64Image(reader.result);
                                    setEditingProduct({ ...editingProduct, image: compressed });
                                    triggerToast('ပုံထည့်သွင်းမှု အောင်မြင်သည်။');
                                  };
                                  reader.readAsDataURL(file);
                                }
                              }}
                              className="hidden"
                            />
                          </label>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="flex justify-end gap-2 border-t border-slate-100 pt-4">
                    <button
                      type="button"
                      onClick={() => setEditingProduct(null)}
                      className="bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-xl text-[11px] font-black cursor-pointer transition active:scale-95 text-slate-700"
                    >
                      မလုပ်တော့ပါ (Cancel)
                    </button>
                    <button
                      type="submit"
                      className="bg-amber-500 hover:bg-amber-600 text-white px-5 py-2 rounded-xl text-[11px] font-black cursor-pointer transition active:scale-95 shadow-md shadow-amber-500/10"
                    >
                      ပြောင်းလဲသိမ်းဆည်းရန် (Save Product)
                    </button>
                  </div>
                </form>
              </div>
            )}


            {/* MODAL 3: LIGHTBOX COZY DISPLAY FOR ZOOMING BANK SLIPS BYPASSING WEB IFRAME SEC_BLOCKED */}
            {zoomedSlipImage && (
              <div 
                onClick={() => setZoomedSlipImage(null)}
                className="fixed inset-0 bg-slate-950/85 backdrop-blur-xs flex items-center justify-center p-4 z-[500] cursor-zoom-out animate-fade-in"
              >
                <div 
                  className="bg-[#FFFDF9]/5 border border-white/10 p-2 rounded-2xl max-w-sm w-full relative" 
                  onClick={e => e.stopPropagation()}
                >
                  <img src={zoomedSlipImage} alt="ငွေလွှဲပြေစာပုံကြီး" className="w-full h-auto max-h-[80vh] object-contain rounded-xl shadow-2xl" />
                  
                  <div className="flex justify-between items-center mt-3 text-white px-2.5">
                    <span className="text-[10px] bg-white/10 px-3 py-1 rounded-full font-bold">🧾 Dynamic Lightbox Voucher</span>
                    <button 
                      type="button"
                      onClick={() => setZoomedSlipImage(null)} 
                      className="bg-white text-slate-900 hover:bg-slate-50 px-4 py-1.5 rounded-full font-black text-[10px] cursor-pointer shadow-md"
                    >
                      ပိတ်မည် (Close View)
                    </button>
                  </div>
                </div>
              </div>
            )}

          </div>
        );
      }

      // Append App structure inside root container
      const container = document.getElementById('root');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
